services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: miez
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/miez
    depends_on:
      - db
    volumes:
      - ./backend:/app   # live reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app  # live reload
      - /app/node_modules

volumes:
  postgres_data:
